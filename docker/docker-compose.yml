name: pong-ladder

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: sh -c "npx prisma generate && npm run dev"
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://pong:pong@db:5432/pong_ladder?schema=public
      NEXT_PUBLIC_APP_NAME: Pong Ladder
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pong_ladder
      POSTGRES_USER: pong
      POSTGRES_PASSWORD: pong
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pong -d pong_ladder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
